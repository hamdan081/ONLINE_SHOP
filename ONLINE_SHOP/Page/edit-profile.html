<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../Assect/Css/style.css">
    <link rel="stylesheet" href="../Assect/Css/toast.css">
    <script src="../Assect/Js/toast.js"></script>
    <style>
        .profile-page-body {
            background-color: var(--bg-surface);
            padding-top: 70px;
            min-height: 100vh;
        }

        .profile-container {
            max-width: 760px;
            margin: 30px auto;
            padding: 0 18px 40px;
        }

        .back-nav {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .back-nav:hover {
            color: var(--primary);
        }

        .edit-card,
        .form-state {
            background-color: var(--card-bg);
            border: 1px solid rgba(226, 232, 240, 0.9);
            border-radius: 16px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
        }

        .edit-card {
            padding: 26px;
        }

        .form-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dark);
            font-size: 1.35rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .form-subtitle {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 22px;
        }

        .form-title svg,
        .back-nav svg {
            width: 19px;
            height: 19px;
            color: var(--primary);
        }

        .edit-form {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .form-group {
            display: grid;
            gap: 7px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .form-group label {
            color: var(--text-dark);
            font-size: 0.88rem;
            font-weight: 800;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 0 13px;
            background-color: #F8FAFC;
            transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.15);
            background-color: #FFFFFF;
        }

        .input-group svg {
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .input-group input {
            width: 100%;
            min-height: 46px;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-dark);
            font-family: inherit;
            font-size: 0.95rem;
        }

        .field-error {
            min-height: 17px;
            color: #B42318;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .form-message,
        .form-state {
            display: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .form-state {
            display: block;
            color: var(--text-muted);
            text-align: center;
            font-weight: 700;
        }

        .form-state.error,
        .form-message.error {
            display: block;
            color: #B42318;
            background-color: #FEF3F2;
            border: 1px solid #FECDCA;
        }

        .form-message.success {
            display: block;
            color: #027A48;
            background-color: #ECFDF3;
            border: 1px solid #ABEFC6;
        }

        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-save,
        .btn-cancel {
            min-height: 46px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
        }

        .btn-save {
            flex: 1;
            border: none;
            background-color: var(--primary);
            color: #FFFFFF;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(47, 128, 237, 0.18);
        }

        .btn-save:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-save:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-cancel {
            padding: 0 18px;
            background-color: #F1F5F9;
            color: #475569;
        }

        @media (max-width: 640px) {
            .edit-card {
                padding: 20px;
            }

            .edit-form {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column-reverse;
            }
        }
    </style>
</head>
<body class="profile-page-body">
    <header class="site-header">
        <a href="../home.html" class="brand">Marketplace</a>
        <div class="header-actions">
            <a href="cart.html" class="icon-btn" aria-label="Keranjang">
                <i data-lucide="shopping-cart"></i>
            </a>
            <a href="profile.html" class="icon-btn" aria-label="Profil" style="color: var(--primary);">
                <i data-lucide="user"></i>
            </a>
        </div>
    </header>

    <main class="profile-container">
        <a href="profile.html" class="back-nav">
            <i data-lucide="arrow-left"></i>
            <span>Kembali ke Profile</span>
        </a>

        <div id="formState" class="form-state">
            <div class="loading-spinner"></div>
            <p>Memuat data profile...</p>
        </div>

        <section id="editCard" class="edit-card" style="display: none;">
            <h1 class="form-title">
                <i data-lucide="user-cog"></i>
                <span>Edit Profile</span>
            </h1>
            <p class="form-subtitle">Perbarui data akun melalui backend agar tersimpan ke PostgreSQL.</p>
            <p id="formMessage" class="form-message"></p>

            <form id="editProfileForm" class="edit-form" novalidate>
                <div class="form-group">
                    <label for="inputUsername">Nama</label>
                    <div class="input-group">
                        <i data-lucide="user"></i>
                        <input type="text" id="inputUsername" placeholder="Nama lengkap">
                    </div>
                    <span id="usernameError" class="field-error"></span>
                </div>

                <div class="form-group">
                    <label for="inputEmail">Email</label>
                    <div class="input-group">
                        <i data-lucide="mail"></i>
                        <input type="email" id="inputEmail" placeholder="nama@email.com">
                    </div>
                    <span id="emailError" class="field-error"></span>
                </div>

                <div class="form-group">
                    <label for="inputPhone">Nomor HP</label>
                    <div class="input-group">
                        <i data-lucide="phone"></i>
                        <input type="text" id="inputPhone" placeholder="Belum didukung backend">
                    </div>
                    <span id="phoneError" class="field-error"></span>
                </div>

                <div class="form-group">
                    <label for="inputCampus">Kampus</label>
                    <div class="input-group">
                        <i data-lucide="graduation-cap"></i>
                        <input type="text" id="inputCampus" placeholder="Nama kampus">
                    </div>
                    <span id="campusError" class="field-error"></span>
                </div>

                <div class="form-group full">
                    <label for="inputAddress">Alamat</label>
                    <div class="input-group">
                        <i data-lucide="map-pin"></i>
                        <input type="text" id="inputAddress" placeholder="Alamat tinggal">
                    </div>
                    <span id="addressError" class="field-error"></span>
                </div>

                <div class="form-actions">
                    <a href="profile.html" class="btn-cancel">Batal</a>
                    <button type="submit" id="saveButton" class="btn-save">Simpan</button>
                </div>
            </form>
        </section>
    </main>

    <script>
        if (window.lucide) {
            lucide.createIcons();
        }

        const API_BASE = "http://localhost:3000/api";
        let currentUser = null;

        function getUser() {
            const user = JSON.parse(localStorage.getItem('currentUser') || localStorage.getItem('user') || '{}');
            if (!user.id) {
                window.location.href = '../login.html';
                return null;
            }
            return user;
        }

        function showMessage(message, type = 'error') {
            const formMessage = document.getElementById('formMessage');
            formMessage.textContent = message;
            formMessage.className = `form-message ${type}`;
            if (window.showToast) {
                showToast(message, type === 'success' ? 'success' : 'error');
            }
        }

        function clearMessages() {
            document.getElementById('formMessage').className = 'form-message';
            document.getElementById('formMessage').textContent = '';
            document.getElementById('usernameError').textContent = '';
            document.getElementById('emailError').textContent = '';
            document.getElementById('phoneError').textContent = '';
            document.getElementById('campusError').textContent = '';
            document.getElementById('addressError').textContent = '';
        }

        function populateForm(user) {
            document.getElementById('inputUsername').value = user.username || user.name || '';
            document.getElementById('inputEmail').value = user.email || '';
            document.getElementById('inputAddress').value = user.alamat || '';
            document.getElementById('inputCampus').value = user.kampus || '';
            document.getElementById('inputPhone').value = user.no_hp || user.phone || '';
        }

        async function loadProfileFromBackend() {
            const user = getUser();
            if (!user) return;
            currentUser = user;
            populateForm(user);
            document.getElementById('formState').innerHTML = '<div class="loading-spinner"></div><p>Memuat data profile...</p>';
            document.getElementById('formState').className = 'form-state';

            try {
                const response = await fetch(`${API_BASE}/users/profile/${user.id}`);
                const data = await response.json();
                if (!response.ok || !data.success || !data.user) {
                    throw new Error('Gagal memuat profile.');
                }

                currentUser = { ...user, ...data.user };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                populateForm(currentUser);
                document.getElementById('formState').style.display = 'none';
                document.getElementById('editCard').style.display = 'block';
            } catch (error) {
                document.getElementById('formState').textContent = 'Gagal memuat data profile. Pastikan server backend sudah berjalan.';
                document.getElementById('formState').className = 'form-state error';
                document.getElementById('editCard').style.display = 'block';
            }

            if (window.lucide) lucide.createIcons();
        }

        function validateProfileForm() {
            clearMessages();
            let isValid = true;

            const username = document.getElementById('inputUsername').value.trim();
            const email = document.getElementById('inputEmail').value.trim();
            const phone = document.getElementById('inputPhone').value.trim();
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!username) {
                document.getElementById('usernameError').textContent = 'Nama tidak boleh kosong.';
                isValid = false;
            }

            if (!email) {
                document.getElementById('emailError').textContent = 'Email tidak boleh kosong.';
                isValid = false;
            } else if (!emailPattern.test(email)) {
                document.getElementById('emailError').textContent = 'Format email tidak valid.';
                isValid = false;
            }

            if (phone && /[A-Za-z]/.test(phone)) {
                document.getElementById('phoneError').textContent = 'Nomor HP tidak boleh berisi huruf.';
                isValid = false;
            }

            if (!isValid) {
                showMessage('Periksa kembali data profile Anda.');
                if (window.showToast) showToast('Data input belum lengkap atau belum valid.', 'warning');
            }

            return isValid;
        }

        function setLoading(isLoading) {
            const button = document.getElementById('saveButton');
            button.disabled = isLoading;
            button.textContent = isLoading ? 'Menyimpan...' : 'Simpan';
        }

        async function updateProfile(event) {
            event.preventDefault();
            if (!validateProfileForm()) return;

            setLoading(true);

            const payload = {
                username: document.getElementById('inputUsername').value.trim(),
                email: document.getElementById('inputEmail').value.trim(),
                alamat: document.getElementById('inputAddress').value.trim(),
                kampus: document.getElementById('inputCampus').value.trim()
            };

            try {
                const response = await fetch(`${API_BASE}/users/profile/${currentUser.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (!response.ok || !data.success || !data.user) {
                    throw new Error('Gagal menyimpan perubahan profile.');
                }

                const updatedUser = { ...currentUser, ...data.user, no_hp: document.getElementById('inputPhone').value.trim() };
                localStorage.setItem('currentUser', JSON.stringify(updatedUser));
                showMessage('Profile berhasil diperbarui.', 'success');
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 700);
            } catch (error) {
                showMessage('Gagal menyimpan perubahan profile.');
                setLoading(false);
            }
        }

        document.getElementById('editProfileForm').addEventListener('submit', updateProfile);
        loadProfileFromBackend();
    </script>
</body>
</html>
